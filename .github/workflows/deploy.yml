name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Swift 6.2
        run: |
          curl -L https://download.swift.org/swift-6.2.3-release/xcode/swift-6.2.3-RELEASE/swift-6.2.3-RELEASE-osx.pkg -o swift.pkg
          sudo installer -pkg swift.pkg -target /
          export PATH="/Library/Developer/Toolchains/swift-6.2.3-RELEASE.xctoolchain/usr/bin:$PATH"
          echo "/Library/Developer/Toolchains/swift-6.2.3-RELEASE.xctoolchain/usr/bin" >> $GITHUB_PATH

      - name: Install SwiftWasm SDK
        run: |
          curl -L https://github.com/swiftwasm/swift/releases/download/swift-wasm-6.3-SNAPSHOT-2026-02-20-a/swift-wasm-6.3-SNAPSHOT-2026-02-20-a-wasm32-unknown-wasip1.artifactbundle.zip -o swift-wasm.zip
          unzip swift-wasm.zip
          swift sdk install swift-wasm-6.3-SNAPSHOT-2026-02-20-a-wasm32-unknown-wasip1.artifactbundle

      - name: Build Swift WebAssembly
        run: swift build -c release --swift-sdk wasm32-unknown-wasip1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build with Vite
        run: npm run build
        env:
          GITHUB_PAGES: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
